name: Atualizar Cards

on:
  schedule:
    # a cada 6 horas
    - cron: "0 */6 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Baixar cards como SVG
        run: |
          mkdir -p assets

          # Baixa um card, tentando varias vezes, e so aceita SVG valido
          # (ignora paginas de erro que o servico as vezes devolve com HTTP 200)
          baixar() {
            url="$1"; destino="$2"
            for tentativa in 1 2 3 4 5 6 7 8; do
              if curl -sSL --fail --retry 5 --retry-delay 10 --retry-all-errors \
                   --max-time 120 "$url" -o "$destino.tmp" \
                 && grep -qi "<svg" "$destino.tmp" \
                 && ! grep -qiE "something went wrong|maximum retries|invalid username|could ?n.t fetch|rate limit" "$destino.tmp"; then
                mv "$destino.tmp" "$destino"
                echo "OK: $destino (tentativa $tentativa)"
                return 0
              fi
              echo "Tentativa $tentativa falhou para $destino, esperando..."
              rm -f "$destino.tmp"
              sleep 20
            done
            echo "Falhou apos varias tentativas (mantendo versao anterior, se houver): $destino"
          }

          baixar "https://github-profile-summary-cards.vercel.app/api/cards/profile-details?username=Reniwtz&theme=tokyonight" "assets/profile-details.svg"
          baixar "https://github-readme-stats.vercel.app/api?username=Reniwtz&show_icons=true&theme=tokyonight&include_all_commits=true&count_private=true" "assets/stats.svg"
          baixar "https://github-readme-stats.vercel.app/api/top-langs/?username=Reniwtz&layout=compact&langs_count=8&theme=tokyonight" "assets/top-langs.svg"
          baixar "https://github-readme-streak-stats.herokuapp.com/?user=Reniwtz&theme=tokyonight&hide_border=true" "assets/streak.svg"

      - name: Commit dos cards
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Atualizar cards de estatisticas"
          file_pattern: "assets/*.svg"
