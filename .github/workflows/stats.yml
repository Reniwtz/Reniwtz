name: Atualizar Cards

on:
  schedule:
    # a cada 6 horas
    - cron: "0 */6 * * *"
  workflow_dispatch:
  push:
    branches: [main]
    # nao re-disparar quando o proprio workflow commitar os SVGs (evita loop)
    paths-ignore:
      - "assets/**"

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Gera profile, stats e linguagens localmente, lendo a API do GitHub.
      # Nao depende de nenhum servico externo de renderizacao (nunca cai).
      # Usa o PAT pessoal (secrets.PAT_TOKEN) para incluir repos PRIVADOS nas
      # estatisticas de linguagem. Se o secret nao existir, cai no token padrao
      # (so publicos) para nao quebrar.
      - name: Gerar cards
        uses: vn7n24fzkq/github-profile-summary-cards@release
        env:
          GITHUB_TOKEN: ${{ secrets.PAT_TOKEN || secrets.GITHUB_TOKEN }}
        with:
          USERNAME: Reniwtz
          AUTO_PUSH: false

      - name: Copiar cards (tema tokyonight) para assets/
        run: |
          mkdir -p assets
          origem="profile-summary-card-output/tokyonight"
          echo "Conteudo gerado:"; ls -1 "$origem" || true
          cp "$origem/0-profile-details.svg"      assets/profile-details.svg
          # Horario mais produtivo / commits por hora (substitui o antigo Stats).
          cp "$origem/4-productive-time.svg"      assets/productive-time.svg
          echo "Copiado para assets/:"; ls -1 assets/

      # Card de linguagens via metrics: analisa o codigo dos repos INCLUINDO os
      # privados. Precisa do PAT classico (escopo repo) e da analise in-depth,
      # que clona os repos e conta as linguagens de verdade (Python, HTML, CSS,
      # PLSQL, etc.), nao so os publicos.
      - name: Card de linguagens (inclui privados)
        uses: lowlighter/metrics@latest
        with:
          filename: assets/langs.svg
          token: ${{ secrets.PAT_TOKEN || secrets.GITHUB_TOKEN }}
          user: Reniwtz
          template: classic
          base: ""
          output_action: none
          plugin_languages: yes
          plugin_languages_indepth: yes
          plugin_languages_analysis_timeout: 15
          plugin_languages_categories: markup, programming
          plugin_languages_colors: github
          plugin_languages_limit: 8
          plugin_languages_sections: most-used
          plugin_languages_details: bytes-size, percentage

      # Streak vem do dominio mantido (demolab). Se o servico falhar (erro de
      # API do GitHub), NAO sobrescrevemos: preservamos o ultimo streak.svg bom.
      - name: Baixar streak
        run: |
          mkdir -p assets
          url="https://streak-stats.demolab.com/?user=Reniwtz&theme=tokyonight&hide_border=true"
          ok=false
          for t in 1 2 3 4 5; do
            if curl -sSL --fail --retry 5 --retry-delay 10 --retry-all-errors \
                 --max-time 120 "$url" -o assets/streak.tmp \
               && grep -qi "<svg" assets/streak.tmp \
               && ! grep -qi "Failed to retrieve\|API issue\|error" assets/streak.tmp; then
              mv assets/streak.tmp assets/streak.svg
              echo "streak OK (tentativa $t)"; ok=true; break
            fi
            echo "streak tentativa $t falhou (resposta invalida ou de erro), esperando..."
            rm -f assets/streak.tmp; sleep 15
          done
          if [ "$ok" != "true" ]; then
            echo "Servico de streak indisponivel; mantendo o assets/streak.svg anterior."
          fi

      - name: Commit dos cards
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Atualizar cards de estatisticas"
          file_pattern: "assets/*.svg"
